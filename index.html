<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xfinity Hyper-Tracker (Raze Engine) (Trial)</title>
    <style>
        :root {
            --primary: #4a00e0;
            --accent: #8e2de2;
            --bg: #f8f9fa;
            --text: #2d3436;
        }
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 30px 15px;
        }
        .app-wrapper { 
            max-width: 1200px; 
            margin: 0 auto; 
        }
        
        /* Header Dashboard Panel */
        .control-panel {
            background: #fff;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.04);
            margin-bottom: 40px;
            border: 1px solid #edf2f7;
        }
        .brand-header h1 { 
            margin: 0 0 5px 0; 
            font-size: 26px; 
            background: linear-gradient(to right, var(--primary), var(--accent)); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
        }
        .brand-header p { 
            margin: 0; 
            color: #7f8c8d; 
            font-size: 14px; 
        }

        /* Grid Framework */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); 
            gap: 25px; 
        }
        .card {
            background: #fff; 
            border-radius: 14px; 
            padding: 25px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.02);
            display: flex; 
            flex-direction: column; 
            justify-content: space-between;
            border: 1px solid #edf2f7; 
            transition: transform 0.2s;
        }
        .card:hover { 
            transform: translateY(-4px); 
        }
        .provider-pill {
            background: #dfe6e9; 
            color: #2d3436; 
            font-size: 11px;
            font-weight: bold; 
            padding: 4px 10px; 
            border-radius: 20px;
            display: inline-block; 
            margin-bottom: 15px; 
            text-transform: uppercase;
        }
        .card-title { 
            margin: 0 0 12px 0; 
            font-size: 18px; 
            color: #000; 
            line-height: 1.4; 
        }
        .card-desc { 
            color: #636e72; 
            font-size: 14px; 
            line-height: 1.6; 
            margin: 0 0 25px 0; 
        }
        
        /* Direct Action Hyperlink Button */
        .deal-link {
            text-decoration: none; 
            background: #f1f2f6; 
            color: var(--primary);
            text-align: center; 
            padding: 12px; 
            border-radius: 8px;
            font-weight: 600; 
            font-size: 13px; 
            display: block;
            transition: all 0.2s; 
            border: 1px solid transparent;
        }
        .deal-link:hover { 
            background: #fff; 
            border-color: var(--primary); 
        }

        /* System Error Message Container */
        .system-note {
            grid-column: 1 / -1;
            text-align: center;
            background: #fff3cd;
            color: #856404;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #ffeeba;
            line-height: 1.6;
        }
        .system-note ol {
            text-align: left;
            display: inline-block;
            margin-top: 10px;
            padding-left: 20px;
        }
    </style>
</head>
<body>

    <div class="app-wrapper">
        <div class="control-panel">
            <div class="brand-header">
                <h1>📱 Xfinity Hyper-Tracker (Raze Engine)</h1>
                <p>Trial Mode: Tracking live promotional matrix assets using static automation architecture</p>
            </div>
        </div>

        <div class="grid" id="display-matrix">
            <p style="grid-column: 1/-1; text-align: center; color: #7f8c8d;">Initializing local client connection...</p>
        </div>
    </div>

    <script>
        // Reads the shared promos.json data generated by the GitHub Actions pipeline
        fetch('./promos.json?cache_bypass=' + Date.now())
            .then(res => {
                if(!res.ok) throw new Error("Primary database asset file (promos.json) not found yet.");
                return res.json();
            })
            .then(data => renderPromotionMatrix(data))
            .catch(err => {
                document.getElementById('display-matrix').innerHTML = `
                    <div class="system-note">
                        <strong>🛠️ Setup Step Needed:</strong> ${err.message}<br>
                        Because this is a secure trial repo, you just need to start the backend engine inside GitHub to create this file:<br>
                        <ol>
                            <li>Go to your project repository on <strong>GitHub.com</strong></li>
                            <li>Click the <strong>Actions</strong> tab along the top menu</li>
                            <li>Click <strong>Multi-Target Live Scraper</strong> in the left sidebar</li>
                            <li>Click the <strong>Run workflow</strong> button on the right, and confirm</li>
                        </ol>
                        <br>Once the runtime finishes (about 60s), refresh this page to see your live data!
                    </div>`;
            });

        function renderPromotionMatrix(items) {
            const matrix = document.getElementById('display-matrix');
            matrix.innerHTML = ''; // Flush placeholder logs

            if(items.length === 0) {
                matrix.innerHTML = '<p style="grid-column: 1/-1; text-align: center;">No active promos caught in the cluster filters right now.</p>';
                return;
            }

            items.forEach(item => {
                matrix.innerHTML += `
                    <div class="card">
                        <div>
                            <span class="provider-pill">${item.provider}</span>
                            <h3 class="card-title">${item.title}</h3>
                            <p class="card-desc">${item.description}</p>
                        </div>
                        <a href="${item.source_url}" target="_blank" rel="noopener noreferrer" class="deal-link">
                            View Deal Details Original Site →
                        </a>
                    </div>
                `;
            });
        }
    </script>
</body>
</html>
