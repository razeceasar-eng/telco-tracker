<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Telco Hyper-Tracker</title>
    <style>
        :root {
            --primary: #4a00e0;
            --accent: #8e2de2;
            --bg: #f8f9fa;
            --text: #2d3436;
        }
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 30px 15px;
        }
        .app-wrapper { max-width: 1200px; margin: 0 auto; }
        
        /* Control Panel */
        .control-panel {
            background: #fff;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.04);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 40px;
        }
        .brand-header h1 { margin: 0 0 5px 0; font-size: 26px; background: linear-gradient(to right, var(--primary), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .brand-header p { margin: 0; color: #7f8c8d; font-size: 14px; }
        
        .sync-btn {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: #fff; border: none; padding: 14px 28px; font-weight: bold;
            border-radius: 8px; cursor: pointer; transition: opacity 0.2s;
        }
        .sync-btn:hover { opacity: 0.9; }
        .sync-btn:disabled { background: #b2bec3; cursor: not-allowed; }
        #status-log { font-size: 12px; margin-top: 8px; text-align: right; font-weight: 500; }

        /* Card Layout */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px; }
        .card {
            background: #fff; border-radius: 14px; padding: 25px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.02);
            display: flex; flex-direction: column; justify-content: space-between;
            border: 1px solid #edf2f7; transition: transform 0.2s;
        }
        .card:hover { transform: translateY(-4px); }
        .provider-pill {
            background: #dfe6e9; color: #2d3436; font-size: 11px;
            font-weight: bold; padding: 4px 10px; border-radius: 20px;
            display: inline-block; margin-bottom: 15px; text-transform: uppercase;
        }
        .card-title { margin: 0 0 12px 0; font-size: 18px; color: #000; line-height: 1.4; }
        .card-desc { color: #636e72; font-size: 14px; line-height: 1.6; margin: 0 0 25px 0; }
        
        /* Hyperlink Action Button */
        .deal-link {
            text-decoration: none; background: #f1f2f6; color: var(--primary);
            text-align: center; padding: 12px; border-radius: 8px;
            font-weight: 600; font-size: 13px; display: block;
            transition: all 0.2s; border: 1px solid transparent;
        }
        .deal-link:hover { background: #fff; border-color: var(--primary); }
    </style>
</head>
<body>

    <div class="app-wrapper">
        <div class="control-panel">
            <div class="brand-header">
                <h1>📱 Unified Telco Promo Dashboard</h1>
                <p>Tracking live promotions across 3 network infrastructures simultaneously</p>
            </div>
            <div>
                <button class="sync-btn" id="trigger-action" onclick="invokeClusterRun()">Force Cluster Scrape</button>
                <div id="status-log"></div>
            </div>
        </div>

        <div class="grid" id="display-matrix">
            <p style="grid-column: 1/-1; text-align: center; color: #7f8c8d;">Initializing local client connection...</p>
        </div>
    </div>

    <script>
        // DEVELOPER CONFIGURATION PARAMETERS
        const SETTINGS = {
            username: "razeceasar-eng", 
            repo: "telco-tracker",
            token: "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" // Paste Fine-Grained Token here
        };

        // Initialize display engine automatically on load
        fetch('./promos.json?cache_bypass=' + Date.now())
            .then(res => {
                if(!res.ok) throw new Error("Awaiting primary system generation cycle...");
                return res.json();
            })
            .then(data => renderPromotionMatrix(data))
            .catch(err => {
                document.getElementById('display-matrix').innerHTML = `
                    <p style="grid-column: 1/-1; text-align: center; color: #d63031; font-weight: bold;">
                        ${err.message}
                    </p>`;
            });

        function renderPromotionMatrix(items) {
            const matrix = document.getElementById('display-matrix');
            matrix.innerHTML = ''; // Flush placeholder logs

            if(items.length === 0) {
                matrix.innerHTML = '<p style="grid-column: 1/-1; text-align: center;">No active promos caught in the cluster filters.</p>';
                return;
            }

            items.forEach(item => {
                matrix.innerHTML += `
                    <div class="card">
                        <div>
                            <span class="provider-pill">${item.provider}</span>
                            <h3 class="card-title">${item.title}</h3>
                            <p class="card-desc">${item.description}</p>
                        </div>
                        <a href="${item.source_url}" target="_blank" rel="noopener noreferrer" class="deal-link">
                            View Deal Details Original Site →
                        </a>
                    </div>
                `;
            });
        }

        // POST request to launch the GitHub runner framework
        function invokeClusterRun() {
            const button = document.getElementById('trigger-action');
            const feedback = document.getElementById('status-log');
            
            button.disabled = true;
            feedback.innerText = "Initializing remote runner instance...";
            feedback.style.color = "#e67e22";

            const apiEndpoint = `https://api.github.com/repos/${SETTINGS.username}/${SETTINGS.repo}/dispatches`;
            
            fetch(apiEndpoint, {
                method: "POST",
                headers: {
                    "Accept": "application/vnd.github+json",
                    "Authorization": `Bearer ${SETTINGS.token}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ event_type: "ui_trigger_scrape" })
            })
            .then(res => {
                if (res.ok || res.status === 204) {
                    feedback.innerText = "✔ Remote cluster launched. Page updates automatically in 60s.";
                    feedback.style.color = "#2ed573";
                } else {
                    throw new Error(`Execution error context code: ${res.status}`);
                }
            })
            .catch(error => {
                feedback.innerText = `System Fault: ${error.message}`;
                feedback.style.color = "#d63031";
                button.disabled = false;
            });
        }
    </script>
</body>
</html>
