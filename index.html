<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Xfinity Promo Hub</title>
    
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#6138f5">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://img.icons8.com/fluency/192/ffffff/phone.png">

    <style>
        :root {
            --primary: #6138f5;
            --bg: #0f1115;
            --card-bg: #1e2026;
            --text-main: #ffffff;
            --text-sub: #a0a5b5;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }
        .app-header {
            background-color: var(--bg);
            padding: 25px 20px 10px;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .app-header h1 {
            font-size: 22px;
            margin: 0;
            color: var(--primary);
        }
        /* TABS NAVIGATION */
        .tabs-nav {
            display: flex;
            padding: 10px 20px;
            gap: 10px;
            background-color: var(--bg);
            position: sticky;
            top: 60px;
            z-index: 99;
            border-bottom: 1px solid #2a2e3d;
        }
        .tab-btn {
            flex: 1;
            background: #2a2e3d;
            color: var(--text-sub);
            border: none;
            padding: 10px 5px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }
        .tab-btn.active {
            background-color: var(--primary);
            color: white;
        }
        /* CONTENT AREA */
        .content-area {
            padding: 20px;
            min-height: 80vh;
        }
        .grid {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .card {
            background-color: var(--card-bg);
            border-radius: 14px;
            padding: 20px;
            border: 1px solid #2a2e3d;
            animation: fadeIn 0.4s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .card-title {
            font-size: 18px;
            margin: 0 0 8px 0;
            font-weight: 700;
        }
        .card-desc {
            color: var(--text-sub);
            font-size: 14px;
            margin-bottom: 20px;
        }
        .action-link {
            display: block;
            text-align: center;
            background-color: var(--primary);
            color: white;
            text-decoration: none;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 700;
        }
    </style>
</head>
<body>

    <div class="app-header">
        <h1>Xfinity Tracker</h1>
    </div>

    <div class="tabs-nav">
        <button class="tab-btn active" onclick="filterDeals('internet', this)">Internet</button>
        <button class="tab-btn" onclick="filterDeals('mobile', this)">Mobile</button>
        <button class="tab-btn" onclick="filterDeals('now', this)">NOW</button>
    </div>

    <div class="content-area">
        <div class="grid" id="deal-matrix">
            <p style="text-align: center; color: var(--text-sub);">Connecting to sync cluster...</p>
        </div>
    </div>

    <script>
        let allDeals = [];

        // Register Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js');
        }

        // Fetch JSON
        fetch('./promos.json?v=' + Date.now())
            .then(res => res.json())
            .then(data => {
                allDeals = data;
                filterDeals('internet', document.querySelector('.tab-btn.active'));
            })
            .catch(err => {
                document.getElementById('deal-matrix').innerHTML = "<p>Awaiting Data Sync...</p>";
            });

        function filterDeals(category, btn) {
            // Update UI Tabs
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            const container = document.getElementById('deal-matrix');
            container.innerHTML = '';

            // Filter data
            const filtered = allDeals.filter(item => 
                item.provider.toLowerCase().includes(category.toLowerCase())
            );

            if(filtered.length === 0) {
                container.innerHTML = `<p style='text-align:center; padding-top:40px; color:var(--text-sub);'>No live ${category} deals found.</p>`;
                return;
            }

            filtered.forEach(deal => {
                container.innerHTML += `
                    <div class="card">
                        <h3 class="card-title">${deal.title}</h3>
                        <p class="card-desc">${deal.description}</p>
                        <a href="${deal.source_url}" target="_blank" class="action-link">View Promotion →</a>
                    </div>
                `;
            });
            window.scrollTo(0,0);
        }
    </script>
</body>
</html>
