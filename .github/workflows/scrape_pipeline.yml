name: Multi-Target Live Scraper

on:
  schedule:
    - cron: '0 */12 * * *'
  repository_dispatch:
    types: [ui_trigger_scrape]
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Import Repo Workspace
      uses: actions/checkout@v4

    - name: Launch Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Project Prerequisites
      run: pip install -r requirements.txt

    - name: Run Scraping Cluster
      run: python scraper.py

    - name: Save Records back to Repository
      run: |
        git config --global user.name "GitHub Cluster Engine"
        git config --global user.email "actions@github.com"
        git add promos.json
        git diff-index --quiet HEAD || (git commit -m "System Sync: Compiled multi-site data assets" && git push)
